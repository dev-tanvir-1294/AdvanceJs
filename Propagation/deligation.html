<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul id="myList">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>

    <script>
      const list = document.querySelector("#myList");

      // Existing items will trigger the event listener
      list.addEventListener("click", function (e) {
        if (e.target.tagName === "LI") {
          alert("You clicked " + e.target.textContent);
        }
      });

      // Dynamically adding a new list item
      const newItem = document.createElement("li");
      newItem.textContent = "New Dynamic Item";
      list.appendChild(newItem);

      // Even though this new item was added after the event listener was set,
      // clicking on it will still trigger the alert.
    </script>
  </body>
</html>
